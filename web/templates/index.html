<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVideo</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <style>
    /* ── Background ── */
    body {
      background: #070711;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(168,85,247,.14) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 55% 45%, rgba(59,130,246,.10) 0%, transparent 50%);
      background-attachment: fixed;
      color: #e5e5e5;
      min-height: 100vh;
    }

    /* ── Glass utility ── */
    .glass {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.08);
    }

    /* ── Navbar / header glass ── */
    header.glass-nav {
      background: rgba(7,7,17,.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    nav.glass-subnav {
      background: rgba(7,7,17,.50);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    /* ── Cards ── */
    .card-hover {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: .75rem;
      transition: transform .2s, box-shadow .2s, background .2s;
    }

    .card-hover:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,.08);
      box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(99,102,241,.25);
    }

    /* ── bg-gray-* overrides → glass panels ── */
    .bg-gray-900 {
      background: rgba(255,255,255,.04) !important;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.07);
    }
    .bg-gray-800 {
      background: rgba(255,255,255,.06) !important;
    }
    .bg-gray-700 {
      background: rgba(255,255,255,.09) !important;
    }
    .bg-gray-950 {
      background: rgba(7,7,17,.0) !important;
    }

    /* ── Inputs ── */
    input, select {
      background: rgba(255,255,255,.06) !important;
      border-color: rgba(255,255,255,.12) !important;
    }
    input:focus, select:focus {
      border-color: rgba(99,102,241,.6) !important;
      box-shadow: 0 0 0 2px rgba(99,102,241,.15);
    }

    .cover-img {
      aspect-ratio: 16/9;
      object-fit: cover;
      background: rgba(255,255,255,.04);
    }

    .tag-pill {
      display: inline-block;
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: .75rem;
      margin: 2px;
      cursor: pointer;
      transition: background .15s;
    }

    .tag-pill:hover {
      background: rgba(255,255,255,.13);
    }

    .score-badge {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }

    .fade-enter-active, .fade-leave-active { transition: opacity .15s; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }

    .nav-tab {
      padding: 8px 16px;
      font-size: .875rem;
      color: #9ca3af;
      transition: color .15s;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .nav-tab:hover { color: #e5e5e5; }
    .router-link-exact-active.nav-tab,
    .router-link-active.nav-tab {
      color: #fff;
      border-bottom-color: #6366f1;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <!-- ========== VideoCard ========== -->
  <script type="text/x-template" id="tpl-video-card">
  <div class="card-hover cursor-pointer rounded-lg overflow-hidden bg-gray-900 relative" @click="go">
    <div class="relative">
      <img v-if="video.cover_path" :src="'/static/' + video.cover_path" class="cover-img w-full" loading="lazy" @error="imgErr" />
      <div v-else class="cover-img w-full flex items-center justify-center text-gray-600 text-sm">无封面</div>
      <span v-if="video.score" class="score-badge absolute top-2 right-2 text-white text-xs font-bold px-2 py-0.5 rounded">
        {{ video.score.toFixed(1) }}
      </span>
    </div>
    <div class="p-2">
      <div class="text-xs text-indigo-400 font-mono mb-1">{{ video.code }}</div>
      <div class="text-sm leading-snug line-clamp-2 text-gray-200">{{ video.title_zh || video.title_jp || '暂无标题' }}</div>
      <div v-if="video.release_date" class="text-xs text-gray-500 mt-1">{{ video.release_date }}</div>
    </div>
    <!-- Deleted overlay -->
    <div v-if="video.deleted" class="absolute inset-0 bg-black bg-opacity-60 flex items-center justify-center rounded-lg pointer-events-none">
      <span class="text-red-400 text-xs font-bold border border-red-400 px-2 py-0.5 rounded">已删除</span>
    </div>
  </div>
</script>

  <!-- ========== Pagination ========== -->
  <script type="text/x-template" id="tpl-pagination">
  <div class="flex items-center gap-2 justify-center mt-8" v-if="totalPages > 1">
    <button @click="$emit('change', page - 1)" :disabled="page <= 1"
      class="px-3 py-1 rounded bg-gray-800 disabled:opacity-30 hover:bg-gray-700 text-sm">«</button>
    <template v-for="p in pages" :key="p">
      <span v-if="p === '...'" class="text-gray-500 px-1">…</span>
      <button v-else @click="$emit('change', p)"
        :class="['px-3 py-1 rounded text-sm', p === page ? 'bg-indigo-600 text-white' : 'bg-gray-800 hover:bg-gray-700']">{{ p }}</button>
    </template>
    <button @click="$emit('change', page + 1)" :disabled="page >= totalPages"
      class="px-3 py-1 rounded bg-gray-800 disabled:opacity-30 hover:bg-gray-700 text-sm">»</button>
    <span class="text-gray-500 text-sm ml-2">{{ total }} 部</span>
  </div>
</script>

  <!-- ========== HomeView ========== -->
  <script type="text/x-template" id="tpl-home">
  <div>
    <div v-if="loading" class="text-center py-20 text-gray-500">加载中…</div>
    <div v-else>
      <div class="flex justify-end mb-3">
        <sort-bar :sort="sort" @change="changeSort" />
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
        <video-card v-for="v in items" :key="v.id" :video="v" />
      </div>
      <pagination :page="page" :total="total" :limit="limit" @change="changePage" />
    </div>
  </div>
</script>

  <!-- ========== DashboardView ========== -->
  <script type="text/x-template" id="tpl-dashboard">
  <div>
    <div v-if="loading" class="text-center py-20 text-gray-500">加载中…</div>
    <div v-else>
      <!-- Stat cards -->
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-8">
        <div v-for="c in statCards" :key="c.label" class="bg-gray-900 rounded-lg px-4 py-4 flex flex-col gap-1">
          <div class="text-2xl font-bold text-white">{{ c.value.toLocaleString() }}</div>
          <div class="text-xs text-gray-400">{{ c.label }}</div>
        </div>
      </div>

      <!-- Row 1: Year bar + Score dist -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <!-- By year -->
        <div class="bg-gray-900 rounded-lg p-5">
          <h2 class="text-sm font-semibold text-gray-300 mb-4">按年份分布</h2>
          <div class="space-y-2">
            <div v-for="y in stats.by_year" :key="y.year" class="flex items-center gap-2">
              <span class="text-xs text-gray-400 w-10 text-right flex-shrink-0">{{ y.year }}</span>
              <div class="flex-1 bg-gray-800 rounded-full h-4 overflow-hidden">
                <div class="h-4 rounded-full bg-indigo-600" :style="{ width: (y.count / maxByYear * 100) + '%' }"></div>
              </div>
              <span class="text-xs text-gray-300 w-10 flex-shrink-0">{{ y.count }}</span>
            </div>
          </div>
        </div>

        <!-- Score distribution -->
        <div class="bg-gray-900 rounded-lg p-5">
          <h2 class="text-sm font-semibold text-gray-300 mb-4">评分分布</h2>
          <div class="space-y-2">
            <div v-for="s in stats.score_dist" :key="s.range" class="flex items-center gap-2">
              <span class="text-xs text-gray-400 w-16 text-right flex-shrink-0">{{ s.range }}</span>
              <div class="flex-1 bg-gray-800 rounded-full h-4 overflow-hidden">
                <div class="h-4 rounded-full bg-emerald-600" :style="{ width: (s.count / maxScoreDist * 100) + '%' }"></div>
              </div>
              <span class="text-xs text-gray-300 w-10 flex-shrink-0">{{ s.count }}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Row 2: Top makers + Coverage -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <!-- Top makers -->
        <div class="bg-gray-900 rounded-lg p-5">
          <h2 class="text-sm font-semibold text-gray-300 mb-4">Top 10 制片方</h2>
          <div class="space-y-2">
            <div v-for="m in stats.top_makers" :key="m.name" class="flex items-center gap-2">
              <router-link :to="{ path: '/search', query: { q: m.name } }" class="text-xs text-indigo-400 hover:text-indigo-300 truncate flex-shrink-0" style="width:160px">{{ m.name }}</router-link>
              <div class="flex-1 bg-gray-800 rounded-full h-4 overflow-hidden">
                <div class="h-4 rounded-full bg-violet-600" :style="{ width: (m.count / maxMaker * 100) + '%' }"></div>
              </div>
              <span class="text-xs text-gray-300 w-10 flex-shrink-0">{{ m.count }}</span>
            </div>
          </div>
        </div>

        <!-- Data coverage -->
        <div class="bg-gray-900 rounded-lg p-5">
          <h2 class="text-sm font-semibold text-gray-300 mb-4">数据完整度</h2>
          <div class="space-y-4">
            <div v-for="cov in coverage" :key="cov.label">
              <div class="flex justify-between text-xs text-gray-400 mb-1">
                <span>{{ cov.label }}</span>
                <span>{{ cov.value }} / {{ stats.total_videos }} ({{ Math.round(cov.value / stats.total_videos * 100) }}%)</span>
              </div>
              <div class="w-full bg-gray-800 rounded-full h-3 overflow-hidden">
                <div class="h-3 rounded-full" :class="cov.color" :style="{ width: (cov.value / stats.total_videos * 100) + '%' }"></div>
              </div>
            </div>
          </div>
          <!-- Scrape status -->
          <h2 class="text-sm font-semibold text-gray-300 mt-6 mb-3">刮削状态</h2>
          <div class="flex flex-wrap gap-2">
            <span v-for="(cnt, status) in stats.scrape_status" :key="status"
              class="px-2 py-1 rounded text-xs font-medium"
              :class="status === 'SUCCESS' ? 'bg-emerald-900 text-emerald-300' : status === 'PENDING' ? 'bg-yellow-900 text-yellow-300' : 'bg-gray-700 text-gray-300'">
              {{ status }}: {{ cnt }}
            </span>
          </div>
        </div>
      </div>

      <!-- Row 3: Top actors + Top tags -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Top actors -->
        <div class="bg-gray-900 rounded-lg p-5">
          <h2 class="text-sm font-semibold text-gray-300 mb-4">Top 10 演员</h2>
          <div class="space-y-2">
            <router-link v-for="a in stats.top_actors" :key="a.id" :to="'/actor/' + a.id"
              class="flex items-center gap-3 hover:bg-gray-800 rounded px-2 py-1 transition">
              <img v-if="a.avatar_path" :src="'/static/' + a.avatar_path" class="w-8 h-8 rounded-full object-cover flex-shrink-0" @error="imgErr" />
              <span v-else class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-xs flex-shrink-0">?</span>
              <span class="flex-1 text-sm text-gray-200 truncate">{{ a.name }}</span>
              <span class="text-xs text-gray-400">{{ a.count }} 部</span>
            </router-link>
          </div>
        </div>

        <!-- Top tags -->
        <div class="bg-gray-900 rounded-lg p-5">
          <h2 class="text-sm font-semibold text-gray-300 mb-4">Top 15 类别</h2>
          <div class="flex flex-wrap gap-2">
            <router-link v-for="t in stats.top_tags" :key="t.id" :to="'/tag/' + t.id"
              class="flex items-center gap-1 bg-gray-800 hover:bg-gray-700 rounded-full px-3 py-1 text-sm transition">
              <span class="text-gray-200">{{ t.name }}</span>
              <span class="text-gray-500 text-xs">{{ t.count }}</span>
            </router-link>
          </div>
        </div>
      </div>
    </div>
  </div>
</script>

  <!-- ========== SearchView ========== -->
  <script type="text/x-template" id="tpl-search">
  <div>
    <div class="text-gray-400 mb-4 text-sm" v-if="!loading">
      「{{ q }}」共 {{ total }} 条结果
    </div>
    <div v-if="loading" class="text-center py-20 text-gray-500">搜索中…</div>
    <div v-else-if="items.length === 0" class="text-center py-20 text-gray-500">无结果</div>
    <div v-else>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
        <video-card v-for="v in items" :key="v.id" :video="v" />
      </div>
      <pagination :page="page" :total="total" :limit="limit" @change="changePage" />
    </div>
  </div>
</script>

  <!-- ========== VideoDetail ========== -->
  <script type="text/x-template" id="tpl-video-detail">
  <div>
    <div v-if="loading" class="text-center py-20 text-gray-500">加载中…</div>
    <div v-else-if="!video" class="text-center py-20 text-gray-500">未找到该番号</div>
    <div v-else>
      <!-- Back + Edit toggle -->
      <div class="flex items-center justify-between mb-4">
        <button @click="$router.back()" class="text-indigo-400 hover:text-indigo-300 text-sm">← 返回</button>
        <div class="flex gap-2">
          <template v-if="!editing">
            <button v-if="!video.deleted" @click="startEdit" class="px-3 py-1 text-sm rounded bg-gray-700 hover:bg-gray-600 text-gray-200">编辑</button>
            <button v-if="!video.deleted" @click="confirmDelete"
              class="px-3 py-1 text-sm rounded bg-red-800 hover:bg-red-700 text-white">删除</button>
          </template>
          <template v-else>
            <button @click="saveEdit" :disabled="saving"
              class="px-3 py-1 text-sm rounded bg-indigo-600 hover:bg-indigo-500 text-white disabled:opacity-50">
              {{ saving ? '保存中…' : '保存' }}
            </button>
            <button @click="cancelEdit" class="px-3 py-1 text-sm rounded bg-gray-700 hover:bg-gray-600 text-gray-200">取消</button>
          </template>
        </div>
      </div>

      <!-- Deleted banner -->
      <div v-if="video.deleted" class="mb-4 px-4 py-2 bg-red-900 bg-opacity-50 border border-red-700 rounded text-red-300 text-sm flex items-center gap-2">
        <span>⚠️</span><span>该视频文件已删除，数据库记录保留。</span>
      </div>

      <!-- Title -->
      <div class="mb-4">
        <div class="flex items-center gap-3 mb-1">
          <!-- Code: click to edit -->
          <template v-if="!editingCode">
            <span class="font-mono text-indigo-400 text-lg font-bold cursor-pointer hover:underline" @click="startEditCode" title="点击修改番号">{{ video.code }}</span>
          </template>
          <template v-else>
            <input v-ltrim v-model="codeDraft" @keydown.enter="saveCode" @keydown.esc="cancelEditCode"
              class="bg-gray-800 border border-indigo-500 rounded px-2 py-0.5 font-mono text-indigo-300 text-lg font-bold focus:outline-none w-40" />
            <button @click="saveCode" class="text-xs px-2 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-white">保存</button>
            <button @click="cancelEditCode" class="text-xs px-2 py-1 rounded bg-gray-700 hover:bg-gray-600 text-gray-200">取消</button>
          </template>
          <span v-if="!editing && video.score" class="score-badge text-white text-sm font-bold px-2 py-0.5 rounded">{{ Number(video.score).toFixed(1) }}</span>
        </div>
        <h1 class="text-xl font-semibold leading-snug">{{ video.title_zh || video.title_jp }}</h1>
        <p v-if="video.title_zh && video.title_jp" class="text-sm text-gray-500 mt-0.5">{{ video.title_jp }}</p>
      </div>

      <!-- Cover (60%) + Info (40%) -->
      <div class="flex gap-6">
        <!-- Cover with upload overlay -->
        <div class="w-3/5 flex-shrink-0">
          <div class="relative group cursor-pointer" @click="triggerCoverUpload">
            <img v-if="video.cover_path" :src="coverSrc || ('/static/' + video.cover_path)" class="w-full rounded-lg" @error="imgErr" />
            <div v-else class="w-full h-64 bg-gray-800 rounded-lg flex items-center justify-center text-gray-600">无封面</div>
            <div class="absolute inset-0 rounded-lg bg-black bg-opacity-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
              <span class="text-white text-sm">{{ coverUploading ? '上传中…' : '更换封面' }}</span>
            </div>
            <input ref="coverFileInput" type="file" accept="image/*" class="hidden" @change="uploadCover" />
          </div>
          <!-- Playback buttons -->
          <div class="flex items-center gap-2 mt-2">
            <select v-if="fileParts.length > 1" v-model="selectedPart"
              class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-gray-200 focus:outline-none">
              <option v-for="f in fileParts" :key="f.part" :value="f.part || ''">{{ f.part || '完整' }}</option>
            </select>
            <button @click="playVideo"
              class="flex-1 px-3 py-1.5 rounded bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium">▶ Play</button>
            <button @click="copyStreamUrl"
              class="flex-1 px-3 py-1.5 rounded bg-gray-700 hover:bg-gray-600 text-gray-200 text-sm">
              {{ copied ? '已复制 ✓' : '⎘ Copy URL' }}
            </button>
          </div>
        </div>

        <!-- Info -->
        <div class="w-2/5 min-w-0">

          <!-- View mode -->
          <template v-if="!editing">
            <dl class="grid grid-cols-2 gap-x-4 gap-y-2 text-base mb-4">
              <template v-for="row in meta" :key="row.label">
                <dt class="text-gray-500">{{ row.label }}</dt>
                <dd class="truncate">
                  <router-link v-if="row.link" :to="row.link"
                    class="text-indigo-400 hover:text-indigo-300 hover:underline">{{ row.val }}</router-link>
                  <span v-else class="text-gray-200">{{ row.val }}</span>
                </dd>
              </template>
            </dl>
          </template>

          <!-- Edit mode -->
          <template v-else>
            <div class="grid grid-cols-1 gap-3 mb-4">
              <div v-for="f in editFields" :key="f.key" class="relative">
                <label class="block text-xs text-gray-500 mb-1">{{ f.label }}</label>
                <input v-ltrim v-model="form[f.key]" :type="f.type || 'text'" :step="f.step"
                  @input="f.key === 'series' ? onSeriesInput() : null"
                  @blur="f.key === 'series' ? closeSeriesDropdown() : null"
                  @focus="f.key === 'series' && form[f.key] ? onSeriesInput() : null"
                  class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-1.5 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" />
                <ul v-if="f.key === 'series' && seriesSuggestions.length"
                  class="absolute z-50 left-0 right-0 bg-gray-800 border border-gray-600 rounded mt-1 max-h-48 overflow-y-auto shadow-xl">
                  <li v-for="s in seriesSuggestions" :key="s.name"
                    @mousedown.prevent="pickSeries(s)"
                    class="px-3 py-2 text-sm text-gray-200 hover:bg-gray-700 cursor-pointer flex items-center gap-2">
                    <span>{{ s.name_zh || s.name }}</span>
                    <span v-if="s.name_zh" class="text-gray-500 text-xs truncate">{{ s.name }}</span>
                  </li>
                </ul>
              </div>
            </div>
            <p v-if="saveError" class="text-red-400 text-sm mb-3">{{ saveError }}</p>
          </template>

          <!-- Actors -->
          <div class="mb-3">
            <div class="text-gray-500 text-sm mb-1">演员</div>
            <template v-if="!editing">
              <div class="flex flex-wrap gap-2">
                <router-link v-for="a in video.actors" :key="a.id" :to="'/actor/' + a.id"
                  class="flex items-center gap-1.5 bg-gray-800 hover:bg-gray-700 rounded-full px-2 py-1 text-sm transition">
                  <img v-if="a.avatar_path" :src="'/static/' + a.avatar_path" class="w-6 h-6 rounded-full object-cover" @error="imgErr" />
                  <span class="w-6 h-6 rounded-full bg-gray-600 flex items-center justify-center text-xs" v-else>?</span>
                  <span>{{ a.name_zh || a.name }}</span>
                </router-link>
              </div>
            </template>
            <template v-else>
              <div class="flex flex-wrap gap-2 mb-2">
                <span v-for="(a, i) in form.actors" :key="a.name"
                  class="flex items-center gap-1 bg-gray-700 rounded-full px-2 py-1 text-sm">
                  {{ a.name_zh || a.name }}
                  <button @click="removeActor(i)" class="text-gray-400 hover:text-red-400 ml-1 leading-none">×</button>
                </span>
              </div>
              <div class="relative">
                <input v-ltrim v-model="form.newActor" @input="onActorInput" @blur="closeActorDropdown"
                  @keydown.enter.prevent="addActorFromInput"
                  placeholder="输入中文或日文演员名搜索…"

      :class="['px-2.5 py-1 rounded text-xs transition', sort === 'date' ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700']">
      时间
    </button>
    <button @click="$emit('change', 'score')"
      :class="['px-2.5 py-1 rounded text-xs transition', sort === 'score' ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700']">
      评分
    </button>

  <script>
    const { createApp, ref, computed, watch, onMounted } = Vue;
    const { createRouter, createWebHashHistory } = VueRouter;

    // ── scroll position preservation ─────────────────────────
    const _scrollMap = new Map();
    window.addEventListener('scroll', () => {
      _scrollMap.set(window.location.href, window.scrollY);
    }, { passive: true });
    function restoreScroll() {
      const y = _scrollMap.get(window.location.href);
      if (y != null) Vue.nextTick(() => window.scrollTo({ top: y, behavior: 'instant' }));
    }

    // ── helpers ──────────────────────────────────────────────
    async function apiFetch(url, options) {
      const r = await fetch(url, options);
      if (!r.ok) return null;
      return r.json();
    }
    function imgErr(e) { e.target.style.display = 'none'; }
    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes >= 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
      return (bytes / 1e6).toFixed(0) + ' MB';
    }
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => alert('已复制：' + text));
    }

    // ── SortBar ───────────────────────────────────────────────
    const SortBar = {
      name: 'SortBar',
      template: '#tpl-sort-bar',
      props: { sort: { type: String, default: 'date' } },
      emits: ['change'],
    };

    // ── VideoCard ─────────────────────────────────────────────
    const VideoCard = {
      name: 'VideoCard',
      template: '#tpl-video-card',
      props: { video: Object },
      setup(props) {
        const router = VueRouter.useRouter();
        function go() { router.push('/video/' + props.video.code); }
        return { go, imgErr };
      }
    };

    // ── Pagination ────────────────────────────────────────────
    const Pagination = {
      name: 'Pagination',
      template: '#tpl-pagination',
      props: { page: Number, total: Number, limit: Number },
      emits: ['change'],
      setup(props) {
        const totalPages = computed(() => Math.ceil(props.total / props.limit));
        const pages = computed(() => {
          const tp = totalPages.value, cur = props.page, arr = [];
          for (let i = 1; i <= tp; i++) {
            if (i === 1 || i === tp || (i >= cur - 2 && i <= cur + 2)) arr.push(i);
            else if (arr[arr.length - 1] !== '...') arr.push('...');
          }
          return arr;
        });
        return { totalPages, pages };
      }
    };

    // ── HomeView ──────────────────────────────────────────────
    const HomeView = {
      template: '#tpl-home',
      components: { VideoCard, Pagination, SortBar },
      setup() {
        const route = VueRouter.useRoute();
        const router = VueRouter.useRouter();
        const items = ref([]), total = ref(0), limit = 24, loading = ref(true);
        const page = computed(() => parseInt(route.query.page) || 1);
        const sort = computed(() => route.query.sort || 'date');
        async function load() {
          loading.value = true;
          const d = await apiFetch(`/api/videos?page=${page.value}&limit=${limit}&sort=${sort.value}`);
          if (d) { items.value = d.items; total.value = d.total; }
          loading.value = false;
          restoreScroll();
        }
        function changePage(p) { router.push({ query: { ...route.query, page: p } }); }
        function changeSort(s) { router.replace({ query: { ...route.query, sort: s, page: undefined } }); }
        watch(() => [route.query.page, route.query.sort], load);
        onMounted(load);
        return { items, total, page, limit, loading, sort, changePage, changeSort };
      }
    };

    // ── DashboardView ─────────────────────────────────────────
    const DashboardView = {
      template: '#tpl-dashboard',
      setup() {
        const stats = ref(null), loading = ref(true);
        const imgErr = e => { e.target.style.display = 'none'; };

        const maxByYear = computed(() => stats.value ? Math.max(...stats.value.by_year.map(y => y.count), 1) : 1);
        const maxScoreDist = computed(() => stats.value ? Math.max(...stats.value.score_dist.map(s => s.count), 1) : 1);
        const maxMaker = computed(() => stats.value ? Math.max(...stats.value.top_makers.map(m => m.count), 1) : 1);

        const statCards = computed(() => {
          if (!stats.value) return [];
          return [
            { label: '影片总数', value: stats.value.total_videos },
            { label: '演员', value: stats.value.total_actors },
            { label: '类别', value: stats.value.total_tags },
            { label: '系列', value: stats.value.total_series },
            { label: '已删除', value: stats.value.deleted_videos },
            { label: '已刮削', value: stats.value.scrape_status['SUCCESS'] || 0 },
          ];
        });

        const coverage = computed(() => {
          if (!stats.value) return [];
          return [
            { label: '已翻译标题', value: stats.value.translated, color: 'bg-indigo-600' },
            { label: '有封面', value: stats.value.has_cover, color: 'bg-emerald-600' },
          ];
        });

        onMounted(async () => {
          stats.value = await apiFetch('/api/stats');
          loading.value = false;
          restoreScroll();
        });

        return { stats, loading, maxByYear, maxScoreDist, maxMaker, statCards, coverage, imgErr };
      }
    };

    // ── SearchView ────────────────────────────────────────────
    const SearchView = {
      template: '#tpl-search',
      components: { VideoCard, Pagination },
      setup() {
        const route = VueRouter.useRoute();
        const items = ref([]), total = ref(0), page = ref(1), limit = 24, loading = ref(false);
        const q = computed(() => route.query.q || '');
        async function load() {
          if (!q.value) return;
          loading.value = true;
          const d = await apiFetch(`/api/search?q=${encodeURIComponent(q.value)}&page=${page.value}&limit=${limit}`);
          if (d) { items.value = d.items; total.value = d.total; }
          loading.value = false;
          restoreScroll();
        }
        function changePage(p) { page.value = p; window.scrollTo(0, 0); }
        watch([q], () => { page.value = 1; load(); });
        watch(page, load);
        onMounted(load);
        return { items, total, page, limit, loading, q, changePage };
      }
    };

    // ── VideoDetail ───────────────────────────────────────────
    const EDIT_FIELDS = [
      { key: 'title_zh', label: '中文标题' },
      { key: 'title_jp', label: '日文标题' },

      { key: 'duration', label: '时长' },
      { key: 'maker', label: '制片方' },
      { key: 'publisher', label: '发行商' },

    const VideoDetail = {
      template: '#tpl-video-detail',
      setup() {
        const route = VueRouter.useRoute();
        const router = VueRouter.useRouter();
        const video = ref(null), loading = ref(true);
        const editing = ref(false), saving = ref(false), saveError = ref('');
        const form = ref({});
        const actorSuggestions = ref([]);
        const seriesSuggestions = ref([]);
        const pickedSeriesClusterId = ref(null);
        let actorTimer = null, seriesTimer = null;

        // Streaming
        const selectedPart = ref(''), copied = ref(false);
        function streamUrl() {
          // 取文件扩展名（供 VRPlayer 等依赖 URL 后缀识别格式的播放器使用）
          const filePath = (video.value.parts && video.value.parts.length > 0)
            ? (video.value.parts.find(p => p.part === selectedPart.value) || video.value.parts[0]).original_file_path
            : video.value.original_file_path;
          const ext = filePath ? filePath.split('.').pop().toLowerCase() : 'mp4';
          const base = window.location.origin + '/api/videos/' + video.value.code + '/stream.' + ext;
          return selectedPart.value ? base + '?part=' + encodeURIComponent(selectedPart.value) : base;
        }
        function playVideo() { window.open(streamUrl(), '_blank'); }
        async function copyStreamUrl() {
          const url = streamUrl();
          try {
            await navigator.clipboard.writeText(url);
          } catch (e) {
            // Safari 隐身模式 fallback
            const ta = document.createElement('textarea');
            ta.value = url;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          copied.value = true;
          setTimeout(() => { copied.value = false; }, 2000);
        }

        // Cover upload
        const coverFileInput = ref(null), coverUploading = ref(false), coverSrc = ref('');
        function triggerCoverUpload() { if (coverFileInput.value) coverFileInput.value.click(); }
        async function uploadCover(e) {
          const file = e.target.files[0];
          if (!file) return;
          coverUploading.value = true;
          const fd = new FormData();
          fd.append('file', file);
          try {
            const res = await apiFetch('/api/videos/' + video.value.code + '/cover', { method: 'POST', body: fd });
            if (res && res.cover_path) {
              coverSrc.value = '/static/' + res.cover_path + '?t=' + Date.now();
              video.value.cover_path = res.cover_path;
            }
          } finally {
            coverUploading.value = false;
            e.target.value = '';
          }
        }

        // Delete
        async function confirmDelete() {
          if (!confirm(`确认删除「${video.value.code}」？物理文件将被删除，数据库记录保留。`)) return;
          const res = await apiFetch('/api/videos/' + video.value.code, { method: 'DELETE' });
          if (res && res.ok) video.value.deleted = 1;
        }

        // Code rename
        const editingCode = ref(false), codeDraft = ref('');
        function startEditCode() { codeDraft.value = video.value.code; editingCode.value = true; }
        function cancelEditCode() { editingCode.value = false; }
        async function saveCode() {
          const newCode = codeDraft.value.trim();
          if (!newCode || newCode === video.value.code) { editingCode.value = false; return; }
          const res = await apiFetch('/api/videos/' + video.value.code, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: newCode }),
          });
          editingCode.value = false;
          if (res && res.new_code) router.replace('/video/' + res.new_code);
        }

        const meta = computed(() => {
          if (!video.value) return [];
          const v = video.value;
          const rows = [
            { label: '发行日期', val: v.release_date, link: null },
            { label: '时长', val: v.duration, link: null },
            { label: '制片方', val: v.maker, link: v.maker ? { path: '/search', query: { q: v.maker } } : null },
            { label: '发行商', val: v.publisher, link: v.publisher ? { path: '/search', query: { q: v.publisher } } : null },
            { label: '系列', val: v.series_zh || v.series, link: v.series ? (v.series_cluster_id ? { path: '/series-detail', query: { cid: v.series_cluster_id, name: v.series_zh || v.series } } : { path: '/series-detail', query: { s: v.series } }) : null },
          ];
          return rows.filter(r => r.val);
        });
        const fileParts = computed(() => {
          if (!video.value) return [];
          const v = video.value;
          if (v.parts && v.parts.length > 1) {
            return v.parts.map(p => ({ part: p.part, path: p.original_file_path }));
          }
          return v.original_file_path ? [{ part: v.part, path: v.original_file_path }] : [];
        });

        async function load() {
          loading.value = true;
          video.value = await apiFetch('/api/videos/' + route.params.code);
          loading.value = false;
          restoreScroll();
        }

        function startEdit() {
          const v = video.value;
          form.value = {
            title_zh: v.title_zh || '',
            title_jp: v.title_jp || '',
            release_date: v.release_date || '',
            duration: v.duration || '',
            maker: v.maker || '',
            publisher: v.publisher || '',
            series: v.series || '',
            score: v.score != null ? v.score : '',
            actors: [...(v.actors || [])],
            tags: [...(v.tags || [])],
            newActor: '',
            newTag: '',
          };
          saveError.value = '';
          editing.value = true;
        }

        function cancelEdit() { editing.value = false; }

        function removeActor(i) { form.value.actors.splice(i, 1); }

        function onActorInput() {
          clearTimeout(actorTimer);
          const q = form.value.newActor.trim();
          if (!q) { actorSuggestions.value = []; return; }
          actorTimer = setTimeout(async () => {
            const res = await apiFetch('/api/actors?q=' + encodeURIComponent(q));
            actorSuggestions.value = res || [];
          }, 200);
        }
        function closeActorDropdown() { setTimeout(() => { actorSuggestions.value = []; }, 150); }
        function pickActor(a) {
          if (!form.value.actors.find(x => x.name === a.name)) {
            form.value.actors.push({ name: a.name, name_zh: a.name_zh, avatar_path: a.avatar_path });
          }
          form.value.newActor = '';
          actorSuggestions.value = [];
        }
        function addActorFromInput() {
          const q = form.value.newActor.trim();
          if (!q) return;
          if (actorSuggestions.value.length) { pickActor(actorSuggestions.value[0]); return; }
          if (!form.value.actors.find(a => a.name === q || a.name_zh === q)) {
            form.value.actors.push({ name: q, name_zh: '' });
          }
          form.value.newActor = '';
        }

        function onSeriesInput() {
          pickedSeriesClusterId.value = null;
          clearTimeout(seriesTimer);
          const q = form.value.series.trim();
          if (!q) { seriesSuggestions.value = []; return; }
          seriesTimer = setTimeout(async () => {
            const res = await apiFetch('/api/series?q=' + encodeURIComponent(q));
            seriesSuggestions.value = res || [];
          }, 200);
        }
        function closeSeriesDropdown() { setTimeout(() => { seriesSuggestions.value = []; }, 150); }
        function pickSeries(s) {
          // s is {name, name_zh, cluster_id}
          form.value.series = s.name_zh || s.name;
          pickedSeriesClusterId.value = s.cluster_id || null;
          seriesSuggestions.value = [];
        }

        function removeTag(i) { form.value.tags.splice(i, 1); }
        function addTag() {
          const name = form.value.newTag.trim();
          if (name && !form.value.tags.find(t => t.name === name)) {
            form.value.tags.push({ name });
          }
          form.value.newTag = '';
        }

        async function saveEdit() {
          saving.value = true;
          saveError.value = '';
          const f = form.value;
          const payload = {
            title_zh: f.title_zh,
            title_jp: f.title_jp,
            release_date: f.release_date,
            duration: f.duration,
            maker: f.maker,
            publisher: f.publisher,
            series: f.series,
            actors: f.actors.map(a => ({ name: a.name || '', name_zh: a.name_zh || '' })),
            tags: f.tags.map(t => t.name),
          };
          if (pickedSeriesClusterId.value) {
            payload.series_cluster_id = pickedSeriesClusterId.value;
          }
          if (f.score !== '' && f.score !== null) payload.score = parseFloat(f.score);
          try {
            const r = await fetch('/api/videos/' + route.params.code, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!r.ok) {
              const err = await r.json();
              saveError.value = err.error || '保存失败';
            } else {
              video.value = await r.json();
              editing.value = false;
            }
          } catch (e) {
            saveError.value = '网络错误';
          } finally {
            saving.value = false;
          }
        }

        watch(() => route.params.code, load);
        onMounted(load);
        return {
          video, loading, meta, fileParts,
          editing, saving, saveError, form,
          editFields: EDIT_FIELDS,
          actorSuggestions, seriesSuggestions,
          startEdit, cancelEdit, saveEdit,
          removeActor, onActorInput, closeActorDropdown, pickActor, addActorFromInput,
          onSeriesInput, closeSeriesDropdown, pickSeries,
          removeTag, addTag,
          imgErr, formatSize, copy: copyText,
          selectedPart, copied, playVideo, copyStreamUrl,
          coverFileInput, coverUploading, coverSrc, triggerCoverUpload, uploadCover,
          editingCode, codeDraft, startEditCode, cancelEditCode, saveCode,
          confirmDelete,
        };
      }
    };

    // ── ActorView ─────────────────────────────────────────────
    const ActorView = {
      template: '#tpl-actor',
      components: { VideoCard, SortBar },
      setup() {
        const route = VueRouter.useRoute();
        const router = VueRouter.useRouter();
        const data = ref(null), loading = ref(true);
        const fileInput = ref(null), uploading = ref(false), avatarSrc = ref('');
        const editingName = ref(false), nameZhDraft = ref(''), nameDraft = ref('');
        // Tags stored in URL query: ?tags=A,B,C
        const selectedTags = computed(() => new Set(
          route.query.tags ? route.query.tags.split(',').filter(Boolean) : []
        ));

        const allTags = computed(() => {
          if (!data.value) return [];
          const tagSet = new Set();
          for (const v of data.value.videos) {
            if (v.tags) v.tags.forEach(t => tagSet.add(t.name));
          }
          return [...tagSet].sort();
        });

        function toggleTag(t) {
          const s = new Set(selectedTags.value);
          s.has(t) ? s.delete(t) : s.add(t);
          const tags = [...s].join(',') || undefined;
          router.replace({ query: { ...route.query, tags } });
        }

        const sortedVideos = computed(() => {
          if (!data.value) return [];
          let arr = [...data.value.videos];
          if (selectedTags.value.size > 0) {
            arr = arr.filter(v => {
              const vTags = new Set((v.tags || []).map(t => t.name));
              for (const t of selectedTags.value) if (!vTags.has(t)) return false;
              return true;
            });
          }
          if (sort.value === 'score') return arr.sort((a, b) => (b.score || 0) - (a.score || 0));
          return arr.sort((a, b) => (b.release_date || '').localeCompare(a.release_date || ''));
        });
        async function load() {
          loading.value = true;
          avatarSrc.value = '';
          data.value = await apiFetch('/api/actors/' + route.params.id);
          loading.value = false;
          restoreScroll();
        }
        function triggerUpload() {
          if (fileInput.value) fileInput.value.click();
        }
        async function uploadAvatar(e) {
          const file = e.target.files[0];
          if (!file) return;
          uploading.value = true;
          const fd = new FormData();
          fd.append('file', file);
          try {
            const res = await fetch('/api/actors/' + route.params.id + '/avatar', { method: 'POST', body: fd });
            const json = await res.json();
            if (json.avatar_path) {
              avatarSrc.value = '/static/' + json.avatar_path + '?t=' + Date.now();
              data.value.actor.avatar_path = json.avatar_path;
            }
          } finally {
            uploading.value = false;
            e.target.value = '';
          }
        }
        function startEditName() {
          nameZhDraft.value = data.value.actor.name_zh || '';
          nameDraft.value = data.value.actor.name || '';
          editingName.value = true;
        }
        function cancelEditName() { editingName.value = false; }
        async function saveEditName() {
          const payload = {};
          if (nameZhDraft.value !== (data.value.actor.name_zh || '')) payload.name_zh = nameZhDraft.value;
          if (nameDraft.value !== (data.value.actor.name || '')) payload.name = nameDraft.value;
          if (!Object.keys(payload).length) { editingName.value = false; return; }
          const res = await apiFetch('/api/actors/' + route.params.id, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          editingName.value = false;
          if (!res) return;
          if (res.merged && res.redirect_id) {
            router.replace('/actor/' + res.redirect_id);
          } else if (res.actor) {
            data.value.actor.name_zh = res.actor.name_zh;
            data.value.actor.name = res.actor.name;
          }
        }

        const sort = computed(() => route.query.sort || 'date');
        function changeSort(s) { router.replace({ query: { ...route.query, sort: s } }); }

        watch(() => route.params.id, load);
        onMounted(load);
        return {
          data, loading, imgErr, sort, sortedVideos, changeSort,
          fileInput, uploading, avatarSrc, triggerUpload, uploadAvatar,
          editingName, nameZhDraft, nameDraft, startEditName, cancelEditName, saveEditName,
          allTags, selectedTags, toggleTag,
        };
      }

          <router-link to="/videos"    class="nav-tab">影片</router-link>
          <router-link to="/tags"     class="nav-tab">类别</router-link>
          <router-link to="/actors"   class="nav-tab">演员</router-link>
          <router-link to="/series"   class="nav-tab">系列</router-link>
          <router-link to="/prefixes" class="nav-tab">番号</router-link>
        </nav>
      </div>
      <!-- Page -->
      <main class="px-4 py-6 max-w-screen-2xl mx-auto">
        <transition name="fade" mode="out-in">
          <router-view :key="$route.path" />
        </transition>
      </main>
    </div>
  `
    };

    const app = createApp(App);
    app.directive('ltrim', {
      mounted(el) {
        el.addEventListener('input', () => {
          const trimmed = el.value.replace(/^\s+/, '');
          if (trimmed !== el.value) {
            el.value = trimmed;
            el.dispatchEvent(new Event('input', { bubbles: true }));
          }
        });
      }
    });
    app.use(router).mount('#app');
  </script>
</body>
